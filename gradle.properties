# Gradle Performance Settings
org.gradle.jvmargs=-Xmx8G
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.caching.debug=false
org.gradle.configureondemand=true

#----------Mod Properties----------#
#Make sure you edit these before running renameExampleMod!
mod.version=1.0.0
mod.license=All Rights Reserved
# Root Folder Path (/java/group/namespace/)
mod.group=com.example
mod.namespace=examplemod
# Mod ID and Main Class Name
mod.id=example_mod
mod.name=ExampleMod
# English Display Info
mod.author=YourName
mod.github=YourGithub
mod.display_name=Example Mod
mod.description=Yet Another Example Mod
mod.discord=https://discord.gg/yourserver
#----------------------------------#


#------------ Misc Info -----------#
client.user=Dev
client.uuid="00000000-0000-0000-0000-000000000000"
client.modrinth_profiles_dir=
